<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>73inc Infinity — Solana Trading Platform</title>
<link rel="stylesheet" href="/css/styles.css">
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="logo">73inc <span>Infinity</span></div>
    <nav class="nav">
      <button class="nav-btn" data-tab="scanner">Scanner</button>
      <button class="nav-btn" data-tab="trending">Trending</button>
      <button class="nav-btn" data-tab="watchlist">Watchlist</button>
      <button class="nav-btn" data-tab="portfolio">Portfolio</button>
      <button class="nav-btn" data-tab="autotrade">Auto-Trader</button>
    </nav>
    <div class="header-right">
      <span class="live-dot">● LIVE</span>
      <span class="chain-pill">SOLANA</span>
      <span id="wallet-addr"></span>
      <button id="connect-btn">Connect Phantom</button>
      <a class="photon-link" href="https://photon-sol.tinyastro.io/" target="_blank" rel="noopener">⚡ Photon</a>
    </div>
  </header>

  <div id="tab-scanner" class="tab-panel active">
    <div class="filters-bar">
      <select id="filter-signal">
        <option value="all">All Signals</option>
        <option value="BUY">BUY</option>
        <option value="WATCH">WATCH</option>
        <option value="NEUTRAL">NEUTRAL</option>
        <option value="AVOID">AVOID</option>
      </select>
      <select id="filter-age">
        <option value="all">Any Age</option>
        <option value="1h">&lt; 1h</option>
        <option value="6h">&lt; 6h</option>
        <option value="24h">&lt; 24h</option>
      </select>
      <input type="number" id="filter-liquidity" placeholder="Min liquidity $">
      <input type="number" id="filter-volume" placeholder="Min volume 24h $">
      <span class="scan-meta" id="last-scanned">Loading...</span>
    </div>
    <div id="scanner-grid" class="token-grid"></div>
  </div>

  <div id="tab-trending" class="tab-panel">
    <div class="period-bar">
      <button class="period-btn" data-period="m5">5M</button>
      <button class="period-btn" data-period="h1">1H</button>
      <button class="period-btn" data-period="h6">6H</button>
      <button class="period-btn active" data-period="h24">24H</button>
    </div>
    <div id="trending-grid" class="token-grid"></div>
  </div>

  <div id="tab-watchlist" class="tab-panel">
    <div id="watchlist-grid" class="token-grid"></div>
  </div>

  <div id="tab-portfolio" class="tab-panel">
    <div id="portfolio-summary"></div>
    <div id="portfolio-holdings"></div>
  </div>

  <div id="tab-autotrade" class="tab-panel"></div>

  <div id="toast"></div>
</div>
<script type="module" src="/js/main.js"></script>
</body>
</html>
